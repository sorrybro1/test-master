<!doctype html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>添加内容</title>

    <link rel="stylesheet" href="../vendor/simple-line-icons/css/simple-line-icons.css">
    <link rel="stylesheet" href="../vendor/font-awesome/css/fontawesome-all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
    <script>
        window.CKEDITOR_BASEPATH = (window.CTX || "") + "/ckeditor/";
    </script>
    <link rel="stylesheet" href="/ckeditor/plugins/jdmath/mathquill-0.10.1/mathquill.css">
</head>

<body class="sidebar-fixed header-fixed">
<div class="page-wrapper">
    <div id="publicMenu"></div>

    <div class="content">
        <div class="container-fluid">

            <div class="row" style="margin: 10px 0;">
                <div class="col-md-12">
                    <button type="button" class="btn btn-success" onclick="backToList()">返回</button>
                </div>
            </div>

            <div class="row">
                <div class="col-md-12">
                    <div class="card-body">
                        <div class="table-responsive">

                            <form id="add_form" enctype="multipart/form-data">
                                <div class="row" style="width:95%">
                                    <div class="col-md-12">
                                        <div class="form-group">
                                            <label class="form-control-label">分类:</label>
                                            <div id="bank" class="mdc-form-field"></div>
                                        </div>
                                    </div>
                                </div>

                                <div class="row" style="width:95%">
                                    <div class="col-md-12">
                                        <div class="form-group">
                                            <label for="title" class="control-label">标题:</label>
                                            <input type="text" class="form-control" id="title" name="title">
                                        </div>
                                    </div>
                                </div>

                                <div class="row" style="width:95%">
                                    <div class="col-md-12">
                                        <div class="form-group">
                                            <label for="pid" class="control-label">排序:</label>
                                            <input type="text" class="form-control" id="pid" name="pid" value="1">
                                            <small>(输入1~30的整数，用于排序显示，默认值为1)</small>
                                        </div>
                                    </div>
                                </div>

                                <div class="row" style="width:95%">
                                    <div class="col-md-12">
                                        <div class="form-group">
                                            <label for="import_scode" class="control-label">程序运行EXE上传:</label>
                                            <input type="file" name="import_scode" id="import_scode">
                                            <small>(类型：*.exe/*.EXE 或 *.rar/*.RAR)</small>
                                        </div>
                                    </div>
                                </div>

                                <div class="row" style="width:95%">
                                    <div class="col-md-12">
                                        <div class="form-group">
                                            <label for="import_sdll" class="control-label">源码下载RAR上传:</label>
                                            <input type="file" name="import_sdll" id="import_sdll">
                                            <small>(类型：*.rar/*.RAR 或 *.zip/*.ZIP)</small>
                                        </div>
                                    </div>
                                </div>

                                <div class="row" style="width:95%">
                                    <div class="col-md-12">
                                        <div class="form-group">
                                            <label for="codetext" class="control-label">源码:</label>
                                            <textarea class="form-control" style="height:300px" id="codetext" name="codetext"></textarea>
                                        </div>
                                    </div>
                                </div>

                                <div class="row" style="width:95%">
                                    <div class="col-md-12">
                                        <div class="form-group">
                                            <label class="form-control-label">内容定义:</label>
                                            <textarea id="content" name="content"></textarea>
                                        </div>
                                    </div>
                                </div>

                                <div class="row" style="width:95%">
                                    <div class="col-md-12">
                                        <div class="form-group">
                                            <label class="form-control-label">实验目的:</label>
                                            <textarea id="experPurpose" name="experPurpose"></textarea>
                                        </div>
                                    </div>
                                </div>

                                <div class="row" style="width:95%">
                                    <div class="col-md-12">
                                        <div class="form-group">
                                            <label class="form-control-label">实验原理:</label>
                                            <textarea id="experTheory" name="experTheory"></textarea>
                                        </div>
                                    </div>
                                </div>

                                <div class="row" style="width:95%">
                                    <div class="col-md-12">
                                        <div class="form-group">
                                            <label class="form-control-label">算法参数:</label>
                                            <textarea id="ariParameter" name="ariParameter"></textarea>
                                        </div>
                                    </div>
                                </div>

                                <div class="row" style="width:95%">
                                    <div class="col-md-12">
                                        <div class="form-group">
                                            <label class="form-control-label">算法流程:</label>
                                            <textarea id="ariFlow" name="ariFlow"></textarea>
                                        </div>
                                    </div>
                                </div>

                                <div class="row" style="width:95%">
                                    <div class="col-md-12">
                                        <div class="form-group">
                                            <label class="form-control-label">运行结果:</label>
                                            <textarea id="comResults" name="comResults"></textarea>
                                        </div>
                                    </div>
                                </div>

                                <button type="button" class="btn btn-success" style="margin-left:10px;" onclick="submitAdd()">提交</button>
                            </form>

                        </div>
                    </div>
                </div>
            </div>

            <div id="foot"></div>
        </div>
    </div>
</div>

<div class="modal fade" id="alertModal" tabindex="-1" role="dialog" aria-hidden="true" data-backdrop="static">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-body">
                <div id="modal_message" style="text-align:center"><h2>正在添加中.....</h2></div>
                <div class="progress progress-striped active">
                    <div class="progress-bar progress-bar-success" role="progressbar" style="width:100%;">
                        <span class="sr-only">100% 完成</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="../vendor/jquery/jquery.min.js"></script>
<script src="../vendor/popper.js/popper.min.js"></script>
<script src="../vendor/bootstrap/js/bootstrap.min.js"></script>
<script src="../js/carbon.js"></script>
<script src="../js/demo.js"></script>
<script src="../js/admin-common.js"></script>
<script>
    window.CKEDITOR_BASEPATH = (window.CTX || "") + "/ckeditor/";
</script>
<script src="../ckeditor/ckeditor.js"></script>

<script>
    const RICH_TEXT_IDS = [
        "content",
        "experPurpose",
        "experTheory",
        "ariParameter",
        "ariFlow",
        "comResults"
    ];

    $(function () {
        $("#publicMenu").load("/admin/publicMenu.html");
        $("#foot").load("/admin/foot.html");

        $.ajax({
            type: "GET",
            url: CTX + "/admin-api/types/listAll",
            success: function (res) {
                let list = res && res.list ? res.list : (Array.isArray(res) ? res : []);
                let htm = "";
                for (let i = 0; i < list.length; i++) {
                    const it = list[i];
                    htm += '<input class="mdc-radio__native-control" type="radio" id="t_' + it.id + '" name="tid" value="' + it.id + '">';
                    htm += '<label for="t_' + it.id + '">' + it.name + '</label>&nbsp;&nbsp;&nbsp;';
                }
                $("#bank").html(htm);
            },
            error: function () {
                alert("获取分类失败");
            }
        });

        initEditors();
    });

    function initEditors() {
        if (!window.CKEDITOR) {
            console.error("CKEDITOR 未加载");
            return;
        }

        CKEDITOR.disableAutoInline = true;

        RICH_TEXT_IDS.forEach(function (id) {
            if (CKEDITOR.instances[id]) {
                CKEDITOR.instances[id].destroy(true);
            }

            CKEDITOR.replace(id, {
                allowedContent: true,
                forcePasteAsPlainText: false,
                pasteFromWordRemoveFontStyles: false,
                pasteFromWordRemoveStyles: false,
                height: 260
            });
        });
    }

    function backToList() {
        window.location.href = CTX + "/admin/stContent.html";
    }

    function getCk(name) {
        if (window.CKEDITOR && CKEDITOR.instances && CKEDITOR.instances[name]) {
            return CKEDITOR.instances[name].getData() || "";
        }
        return "";
    }

    function showLoading(text) {
        $("#modal_message").html("<h2>" + (text || "正在上传中...") + "</h2>");
        $("#alertModal").modal("show");
    }

    function hideLoading() {
        $("#alertModal").modal("hide");
    }

    function getFileExt(filename) {
        if (!filename || filename.indexOf(".") === -1) return "";
        return filename.substring(filename.lastIndexOf(".") + 1).toLowerCase();
    }

    function validateFiles() {
        const programFile = document.getElementById("import_scode")?.files?.[0];
        const codeFile = document.getElementById("import_sdll")?.files?.[0];

        if (programFile) {
            const ext = getFileExt(programFile.name);
            const allow = ["exe", "rar"];
            if (!allow.includes(ext)) {
                return "程序运行文件格式不正确，只允许上传：.exe 或 .rar";
            }
        }

        if (codeFile) {
            const ext = getFileExt(codeFile.name);
            const allow = ["rar", "zip"];
            if (!allow.includes(ext)) {
                return "源码下载文件格式不正确，只允许上传：.rar 或 .zip";
            }
        }

        return "";
    }

    function parseAjaxError(xhr) {
        try {
            if (xhr.responseJSON && xhr.responseJSON.msg) {
                return xhr.responseJSON.msg;
            }

            if (xhr.responseText) {
                const txt = xhr.responseText.trim();

                try {
                    const json = JSON.parse(txt);
                    if (json.msg) return json.msg;
                    if (json.message) return json.message;
                    if (json.error) return json.error;
                } catch (e) {
                    // 不是 JSON，继续往下判断
                }

                if (txt.includes("Maximum upload size exceeded")) {
                    return "上传失败：文件过大，超过服务器允许的上传大小";
                }
                if (txt.includes("Incorrect string value")) {
                    return "上传失败：内容中包含数据库当前字符集不支持的特殊字符，请把数据库相关字段改为 utf8mb4";
                }
                if (txt.includes("Multipart")) {
                    return "上传失败：表单文件解析异常，请检查文件是否损坏或大小是否超限";
                }
                if (txt.includes("SQLSyntaxErrorException")) {
                    return "上传失败：数据库字段或表结构和当前代码不一致";
                }
                if (txt.includes("File format not supported")) {
                    return "上传失败：文件格式不支持";
                }

                return txt.length > 300 ? "服务器内部错误，请查看后端日志" : txt;
            }

            if (xhr.status === 413) {
                return "上传失败：文件过大";
            }
            if (xhr.status === 404) {
                return "上传失败：接口不存在，请检查请求地址";
            }
            if (xhr.status === 415) {
                return "上传失败：请求格式不正确";
            }
            if (xhr.status === 500) {
                return "上传失败：服务器内部错误，请查看后端日志";
            }

            return "上传失败：HTTP " + xhr.status;
        } catch (e) {
            return "上传失败：未知错误";
        }
    }

    function submitAdd() {
        const fd = new FormData();

        const tidVal = $("input[name='tid']:checked").val();
        if (!tidVal || isNaN(Number(tidVal))) {
            alert("提交错误：请选择分类（tid不能为空）");
            return;
        }

        const titleVal = ($("#title").val() || "").trim();
        if (!titleVal) {
            alert("提交错误：标题不能为空");
            return;
        }

        const fileError = validateFiles();
        if (fileError) {
            alert("提交错误：" + fileError);
            return;
        }

        fd.append("tid", tidVal);
        fd.append("pid", $("#pid").val() || "");
        fd.append("title", titleVal);

        fd.append("codetext", $("#codetext").val() || "");

        fd.append("content", getCk("content"));
        fd.append("experPurpose", getCk("experPurpose"));
        fd.append("experTheory", getCk("experTheory"));
        fd.append("ariParameter", getCk("ariParameter"));
        fd.append("ariFlow", getCk("ariFlow"));
        fd.append("comResults", getCk("comResults"));

        const scodeFile = document.getElementById("import_scode")?.files?.[0];
        if (scodeFile) fd.append("import_scode", scodeFile);

        const sdllFile = document.getElementById("import_sdll")?.files?.[0];
        if (sdllFile) fd.append("import_sdll", sdllFile);

        $.ajax({
            url: CTX + "/admin-api/contents/create",
            type: "POST",
            data: fd,
            processData: false,
            contentType: false,

            beforeSend: function () {
                showLoading("正在上传中...");
            },

            xhr: function () {
                const xhr = new window.XMLHttpRequest();
                xhr.upload.addEventListener("progress", function (evt) {
                    if (evt.lengthComputable) {
                        const percent = Math.round((evt.loaded / evt.total) * 100);
                        $("#modal_message").html("<h2>正在上传中... " + percent + "%</h2>");
                    }
                }, false);
                return xhr;
            },

            success: function (res) {
                if (res && res.success) {
                    alert("提交成功");
                    window.location.href = CTX + "/admin/stContent.html";
                } else {
                    alert("提交错误：" + ((res && res.msg) ? res.msg : "提交失败"));
                }
            },

            error: function (xhr) {
                const msg = parseAjaxError(xhr);
                alert("提交错误：" + msg);
                console.log("提交失败详情：", xhr);
            },

            complete: function () {
                hideLoading();
            }
        });
    }

    document.addEventListener("click", function(e) {
        const btn = e.target.closest(".sidebar-toggle");
        if (!btn) return;
        e.preventDefault();
        document.body.classList.toggle("sidebar-hidden");
    });
</script>
</body>
</html>
