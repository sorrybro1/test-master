<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title>创建课程</title>

    <link rel="stylesheet" href="../js/bootstrap-3.3.7/css/bootstrap.min.css">
    <link rel="stylesheet" href="../js/bootstrap-table/dist/bootstrap-table.min.css">
    <link rel="stylesheet" href="../js/fontawesome.min.css">

    <link href="../js/My97DatePicker/skin/WdatePicker.css" rel="stylesheet">
    <link href="../js/bootstrap-tree/css/bootstrapStyle/bootstrapStyle.css" type="text/css" rel="stylesheet">

    <style type="text/css">
        /* 参照 userManagement 的样式，顶部留出导航栏高度 */
        body { padding-top: 50px; }
        .page-wrapper1 {
            margin-top: 0;
            padding-top: 20px; /* 给内容顶部留一点呼吸空间，和 userManagement 一致 */
        }

        /* 修复 input-group 和 select 的对齐 */
        .form-inline .form-group { vertical-align: middle; }
        .form-inline .input-group { vertical-align: middle; }
    </style>
</head>
<body>

<div class="page-wrapper1">
    <div class="container-fluid">
        <div class="row">

            <div id="nav-placeholder">
            </div>

            <div class="col-xs-10">
                <div class="panel panel-default">
                    <div class="panel-heading">
                        创建课程
                    </div>

                    <div class="panel-body">
                        <form class="form-inline">

                            <div class="form-group">
                                <select id="semester" class="form-control" style="width: 160px;"></select>
                            </div>

                            <div class="form-group" style="margin-left: 10px;">
                                <div class="input-group">
                                    <span class="input-group-btn">
                                        <button id="add_org" class="btn btn-primary" type="button" data-toggle="modal">
                                            班级
                                        </button>
                                    </span>
                                    <input id="org_name" class="form-control" value="请选择班级" readonly style="width:178px; background-color: #eee;">
                                </div>
                                <input id="orgid" name="orgid" type="hidden">
                            </div>

                            <button onclick="selectExp()" class="btn btn-default" type="button" style="margin-left: 10px;">开设实验</button>
                        </form>

                        <div style="margin-top:15px;">
                            <table id="mytab" class="table table-hover"></table>
                        </div>

                        <div class="modal fade bs-example-modal-lg" id="addTree_modal" tabindex="-1" role="dialog" aria-labelledby="myModalLabel" aria-hidden="true">
                            <div class="modal-dialog modal-lg" style="max-width:500px;">
                                <div class="modal-content">
                                    <div class="modal-header">
                                        <h4 class="modal-title">班级</h4>
                                    </div>
                                    <div class="modal-body">
                                        <ul id="add_tree" class="ztree"></ul>
                                        <input type="hidden" id="ztreeid">
                                        <input type="hidden" id="ztreesname">
                                    </div>
                                    <div class="modal-footer">
                                        <button type="button" class="btn btn-default" data-dismiss="modal">关闭</button>
                                        <button type="button" class="btn btn-primary" onclick="selection();">确定</button>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div> </div> </div>
</div>

<script src="../js/jquery.min.js"></script>
<script src="../js/bootstrap-3.3.7/js/bootstrap.min.js"></script>
<script src="../js/bootstrap-table/dist/bootstrap-table.min.js"></script>
<script src="../js/bootstrap-table/dist/locale/bootstrap-table-zh-CN.min.js"></script>

<script type="text/javascript" src="../js/My97DatePicker/WdatePicker.js"></script>
<script type="text/javascript" src="../js/bootstrap-tree/js/jquery.ztree.core.js"></script>
<script type="text/javascript" src="../js/bootstrap-tree/js/jquery.ztree.excheck.js"></script>
<script type="text/javascript" src="../js/bootstrap-tree/js/jquery.ztree.exedit.js"></script>

<script type="text/javascript">
    var ctx = "";

    $(function () {
        // 加载左侧导航
        $("#nav-placeholder").load("../common/nav_per.html", function() {
            setTimeout(function(){
                // 确保高亮逻辑正确
                $(".sidebar-nav a").removeClass("active");
                $("#link_create_course").addClass("active");
            }, 300);
        });
        getSemester();
        getCurriculumList();
    });

    // 3. 获取课程列表
    function getCurriculumList() {
        $('#mytab').bootstrapTable({
            method : 'post',
            url : ctx + "/api/content/list",
            striped : true,
            dataType: "json",
            pagination : true,
            sidePagination : 'client',
            pageList: [10, 20, 50],
            pageSize: 10,
            pageNumber: 1,
            search: true,
            clickToSelect : true,
            contentType: 'application/x-www-form-urlencoded; charset=UTF-8',
            columns : [
                { checkbox: true, visible: true },
                {
                    title: '序号',
                    align: 'center',
                    width: 50,
                    formatter: function (value, row, index) { return index + 1; }
                },
                { title : '实验项目', align: 'center', field : 'title' },
                { title : '算法分类', align: 'center', field : 'tName', formatter: function(value) { return value ? value : '-'; } }
            ]
        });
    }

    function getSemester() {
        $.ajax({
            type: "post",
            url: ctx + "/api/content/getSemester",
            cache:false,
            async:false,
            success:function(data){
                var res=$.parseJSON(data);
                $("#semester").html(res);
            },
            error:function(){ alert("获取数据失败"); }
        });
    }

    $("#add_org").click(function(){
        get_tree();
        $.fn.zTree.init($("#add_tree"), setting, zNodes);
        setTimeout("$('#addTree_modal').modal('show')",100);
    });

    function selectExp(){
        var rows= $("#mytab").bootstrapTable('getSelections');
        if (rows.length == 0) { alert("请选择有效数据"); return; }
        var selectRows=JSON.stringify(rows);
        var xqo = eval('(' + selectRows + ')');
        var reportsIds="";
        for(var i in xqo){ reportsIds += xqo[i].id + ","; }
        var orgid=$("#orgid").val();
        if(orgid==null||orgid==""){ alert("班级不能为空！"); return; }
        var semester = encodeURI(encodeURI($("#semester").val()));
        if(semester==null||semester==""){ alert("实验学期不能为空！"); return; }
        $.ajax({
            type: "post",
            url: ctx + "/api/content/establish?uid="+reportsIds+"&semester="+semester+"&orgid="+orgid,
            dataType : 'json',
            success: function (data) {
                //var res = $.parseJSON(data);
                alert(data.msg);
                window.location.href = ctx + 'stContent.html';
            }
        });
    }

    var setting = {
        view: { selectedMulti: false },
        check: { enable: true, chkboxType: { "Y": "s", "N": "s" } },
        data: { simpleData: { enable: true } },
        edit: { enable: false },
        callback: { onCheck: onCheck }
    };
    var zNodes ="";
    function get_tree() {
        $.ajax({
            type: "post",
            url: ctx + "/api/stOrgCtr/getOrgInfo",
            cache:false,
            async:false,
            dataType : 'json',
            success:function(res){ zNodes =res.tree; },
            error:function(){ alert("班级分类查询失败！"); }
        });
    }
    function onCheck(e, treeId, treeNode){
        var zTree =  $.fn.zTree.getZTreeObj("add_tree").getNodesByFilter(filter);
        var ids = "";
        var names="";
        for (var i = 0; i < zTree.length; i++) {
            if (zTree[i].id != null) { ids += (i == (zTree.length-1))?zTree[i].id:zTree[i].id+","; }
            if(zTree[i].name !=null){ names += (i == (zTree.length-1))?zTree[i].name:zTree[i].name+","; }
        };
        $("#ztreesname").val(names);
        $("#ztreeid").val(ids);
    }
    function filter(node) { return (node.checked == true); }
    function selection() {
        var id=$("#ztreeid").val();
        var name=$("#ztreesname").val();
        if(id!="" && name!=""){
            $("#addTree_modal").modal('hide');
            $("#orgid").val(id);
            $("#org_name").val(name);
        }else{
            alert("请选择班级！");
        }
    }
</script>
</body>
</html>
